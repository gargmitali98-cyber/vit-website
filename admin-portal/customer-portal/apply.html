<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Apply for Coverage — Daman Health</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/customer/css/style.css">
</head>
<body>

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-brand">
    <img src="/public/daman-logo.webp" alt="Daman Health" class="brand-mark">
    <div>
      <div class="brand-name">Daman Health</div>
      <div class="brand-sub">Underwriting Application</div>
    </div>
  </div>
  <div class="topbar-divider"></div>
  <div class="topbar-app-id" id="topbarAppId">—</div>
  <div class="topbar-right">
    <div class="save-pill" id="savePill">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Saved
    </div>
    <div class="topbar-help">Need help?</div>
  </div>
</header>

<!-- Layout -->
<div class="app-layout">

  <!-- Left Nav -->
  <nav class="left-nav">
    <div class="nav-header">
      <div class="nav-app-label">Your Application</div>
      <div class="nav-app-title">Health Disclosure Form</div>
    </div>

    <div class="nav-progress-wrap">
      <div class="nav-progress-label">
        <span>Progress</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="nav-items" id="navItems"></div>

    <div class="nav-footer">
      <div class="nav-security">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        256-bit encrypted · GDPR compliant
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="main-content" id="mainContent"></main>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────
// CONSTANTS & NAV CONFIG
// ─────────────────────────────────────────────────
const SECTIONS = [
  { id: 'personal',    label: 'Personal Information',    sub: 'Name, DOB, contact',      emoji: '👤' },
  { id: 'lifestyle',   label: 'Lifestyle Factors',       sub: 'Smoking, alcohol, BMI',   emoji: '🏃' },
  { id: 'family',      label: 'Family History',          sub: 'Hereditary conditions',   emoji: '👨‍👩‍👧' },
  { id: 'claims',      label: 'Insurance & Claims',      sub: 'Existing cover & claims', emoji: '📋' },
  { id: 'disclosure',  label: 'Disclosure of Health',    sub: 'Good health declaration', emoji: '🩺' },
  { id: 'conditions',  label: 'Medical Conditions',      sub: 'Select & answer questions', emoji: '💊' },
  { id: 'documents',   label: 'Documents',               sub: 'Upload supporting files', emoji: '📎' },
  { id: 'review',      label: 'Review & Submit',         sub: 'Confirm & submit',        emoji: '✅' },
];

// ─────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────
let appId = sessionStorage.getItem('appId') || '';
let currentSection = 'personal';
let completed = new Set();
let appData = {};
let diseasesList = [];
let selectedDiseases = new Set();
let questionAnswers = {};
let questionsData = {};
let documents = { identity: [], medical: [], insurance: [] };

// ─────────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────────
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'error' ? '#dc2626' : type === 'success' ? '#16a34a' : '#1e293b';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function showSaved() {
  const el = document.getElementById('savePill');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ─────────────────────────────────────────────────
// NAV RENDER
// ─────────────────────────────────────────────────
function renderNav() {
  const total = SECTIONS.length - 1;
  const pct = Math.round((completed.size / total) * 100);
  document.getElementById('progressFill').style.width = Math.min(pct, 100) + '%';
  document.getElementById('progressPct').textContent = Math.min(pct, 100) + '%';

  document.getElementById('navItems').innerHTML = SECTIONS.map(function(s) {
    const isDone = completed.has(s.id);
    const isActive = s.id === currentSection;

    let statusHtml;
    if (isDone) statusHtml = '<div class="nav-status done">&#10003;</div>';
    else if (isActive) statusHtml = '<div class="nav-status active">&#9679;</div>';
    else statusHtml = '<div class="nav-status pending"></div>';

    const cls = ['nav-item', isActive ? 'active' : '', isDone && !isActive ? 'done' : ''].filter(Boolean).join(' ');
    return '<div class="' + cls + '" onclick="navigateTo(\'' + s.id + '\')">' +
      '<div class="nav-icon">' + s.emoji + '</div>' +
      '<div class="nav-item-body">' +
        '<div class="nav-item-label">' + s.label + '</div>' +
        '<div class="nav-item-sub">' + s.sub + '</div>' +
      '</div>' +
      statusHtml +
    '</div>';
  }).join('');
}

function navigateTo(id) {
  if (id === currentSection) return;
  currentSection = id;
  renderNav();
  renderSection();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─────────────────────────────────────────────────
// SECTION ROUTER
// ─────────────────────────────────────────────────
function renderSection() {
  const map = { personal: renderPersonal, lifestyle: renderLifestyle, family: renderFamily, claims: renderClaims, disclosure: renderDisclosure, conditions: renderConditions, documents: renderDocuments, review: renderReview };
  document.getElementById('mainContent').innerHTML = '';
  (map[currentSection] || renderPersonal)();
}

// ─────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────
function val(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

function pillGroup(groupId, options, stored) {
  return '<div class="pill-group" id="' + groupId + '">' +
    options.map(o => '<button type="button" class="pill ' + (stored === o ? 'selected' : '') + '" onclick="selectPill(\'' + groupId + '\',\'' + o.replace(/'/g, "\\'") + '\',this)">' + escHtml(o) + '</button>').join('') +
  '</div>';
}

function selectPill(groupId, value, btn) {
  document.querySelectorAll('#' + groupId + ' .pill').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function getPill(groupId) {
  const sel = document.querySelector('#' + groupId + ' .pill.selected');
  return sel ? sel.textContent.trim() : '';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function toggleRowHtml(id, label, sub, expandHtml) {
  const checked = appData[id] === true;
  return '<div class="toggle-row" id="tr_' + id + '">' +
    '<div class="toggle-body">' +
      '<div class="toggle-label">' + label + '</div>' +
      (sub ? '<div class="toggle-sub">' + sub + '</div>' : '') +
    '</div>' +
    '<label class="sw"><input type="checkbox" id="' + id + '" ' + (checked ? 'checked' : '') + ' onchange="onToggle(\'' + id + '\')"><span class="sw-track"></span></label>' +
  '</div>' +
  (expandHtml ? '<div class="toggle-expand" id="exp_' + id + '" style="display:' + (checked ? 'block' : 'none') + '">' + expandHtml + '</div>' : '');
}

function onToggle(id) {
  const el = document.getElementById(id);
  appData[id] = el.checked;
  const exp = document.getElementById('exp_' + id);
  if (exp) exp.style.display = el.checked ? 'block' : 'none';
}

async function ensureAppExists() {
  // Verify the current appId is still valid on the server
  if (!appId) return false;
  try {
    const check = await fetch('/api/applications/' + appId);
    if (check.status === 404) {
      // Server was restarted — in-memory app is gone. Create a fresh one.
      const create = await fetch('/api/applications', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      const created = await create.json();
      if (created.success) {
        appId = created.data.id;
        sessionStorage.setItem('appId', appId);
        document.getElementById('topbarAppId').textContent = 'App ID: ' + appId.slice(0, 8) + '…';
        // Reset completed state since we have a fresh app
        completed.clear();
        renderNav();
        return true;
      }
      toast('Could not create application — is the server running?', 'error');
      return false;
    }
    return true;
  } catch {
    toast('Cannot reach server — please check it is running on port 3000', 'error');
    return false;
  }
}

async function saveSection(endpoint, body) {
  if (!appId) { toast('No application ID — please go back to the home page and start a new application', 'error'); return false; }
  try {
    let res = await fetch('/api/applications/' + appId + '/' + endpoint, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    // If 404, the server likely restarted and lost the in-memory app — recover automatically
    if (res.status === 404) {
      const recovered = await ensureAppExists();
      if (!recovered) return false;
      res = await fetch('/api/applications/' + appId + '/' + endpoint, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    }
    const data = await res.json();
    if (!data.success) { toast('Save failed: ' + (data.error || 'Unknown error'), 'error'); return false; }
    showSaved();
    return true;
  } catch (e) {
    toast('Network error — make sure the server is running on port 3000', 'error');
    return false;
  }
}

function markDone(id) {
  completed.add(id);
  renderNav();
}

function nextSection() {
  const idx = SECTIONS.findIndex(s => s.id === currentSection);
  if (idx < SECTIONS.length - 1) {
    currentSection = SECTIONS[idx + 1].id;
    renderNav();
    renderSection();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function actionBar(onNextFn, nextLabel, showBack) {
  nextLabel = nextLabel || 'Save &amp; Continue';
  const idx = SECTIONS.findIndex(s => s.id === currentSection);
  const backBtn = (showBack !== false && idx > 0) ? '<button class="btn btn-ghost" onclick="navigateTo(\'' + SECTIONS[idx-1].id + '\')">&#8592; Back</button>' : '<div></div>';
  return '<div class="action-bar">' + backBtn +
    '<button class="btn btn-primary btn-lg" id="nextBtn" onclick="' + onNextFn + '">' + nextLabel +
      '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>' +
    '</button></div>';
}

function resetNextBtn(label) {
  const btn = document.getElementById('nextBtn');
  if (btn) { btn.disabled = false; btn.innerHTML = (label || 'Save &amp; Continue') + '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>'; }
}

// ─────────────────────────────────────────────────
// DYNAMIC SECTION QUESTION RENDERER
// Fetches admin-configured questions from /api/section-questions
// ─────────────────────────────────────────────────
async function fetchSectionQuestions(section) {
  try {
    const r = await fetch('/api/section-questions?section=' + section);
    const data = await r.json();
    return (data.data || []).filter(q => q.isActive);
  } catch { return []; }
}

function buildFieldHtml(q, stored) {
  const fieldId = 'sq_' + q.id;
  const reqBadge = q.isMandatory ? ' <span class="req">*</span>' : '';
  const labelHtml = '<label>' + escHtml(q.text) + reqBadge + '</label>';
  const type = (q.answerType || 'TEXT').toUpperCase();
  let inputHtml = '';
  const storedVal = stored !== undefined ? stored : '';

  if (type === 'YES_NO') {
    inputHtml = '<div style="margin-top:4px">' + pillGroup('pg_' + fieldId, ['Yes', 'No'], storedVal) + '</div>';
  } else if (type === 'DROPDOWN') {
    const opts = (q.options || []).map(o => '<option value="' + escHtml(o) + '" ' + (storedVal === o ? 'selected' : '') + '>' + escHtml(o) + '</option>').join('');
    inputHtml = '<select class="field" id="' + fieldId + '"><option value="">Select…</option>' + opts + '</select>';
  } else if (type === 'MULTI_SELECT') {
    inputHtml = '<div class="pill-group" id="' + fieldId + '_ms">' +
      (q.options || []).map(function(o) {
        const isSelected = Array.isArray(storedVal) ? storedVal.includes(o) : false;
        return '<button type="button" class="pill' + (isSelected ? ' selected' : '') + '" onclick="this.classList.toggle(\'selected\')" data-val="' + escHtml(o) + '">' + escHtml(o) + '</button>';
      }).join('') + '</div>';
  } else if (type === 'NUMBER') {
    inputHtml = '<input class="field" type="number" id="' + fieldId + '" placeholder="" value="' + escHtml(String(storedVal)) + '">';
  } else if (type === 'DATE') {
    inputHtml = '<input class="field" type="date" id="' + fieldId + '" value="' + escHtml(storedVal) + '">';
  } else {
    inputHtml = '<input class="field" type="text" id="' + fieldId + '" placeholder="" value="' + escHtml(storedVal) + '">';
  }

  return '<div class="form-group"><label>' + escHtml(q.text) + reqBadge + '</label>' + inputHtml + '</div>';
}

function collectSectionAnswers(questions) {
  const body = {};
  questions.forEach(function(q) {
    const fieldId = 'sq_' + q.id;
    const type = (q.answerType || 'TEXT').toUpperCase();
    if (type === 'YES_NO') {
      const sel = document.querySelector('#pg_' + fieldId + ' .pill.selected');
      body[fieldId] = sel ? sel.textContent.trim() : '';
    } else if (type === 'MULTI_SELECT') {
      const selected = [];
      document.querySelectorAll('#' + fieldId + '_ms .pill.selected').forEach(b => selected.push(b.dataset.val));
      body[fieldId] = selected;
    } else {
      const el = document.getElementById(fieldId);
      body[fieldId] = el ? el.value.trim() : '';
    }
  });
  return body;
}

function validateSectionAnswers(questions, answers) {
  const missing = [];
  questions.forEach(function(q) {
    if (!q.isMandatory) return;
    const v = answers['sq_' + q.id];
    if (!v || (Array.isArray(v) && !v.length)) missing.push(q.text);
  });
  return missing;
}

// ─────────────────────────────────────────────────
// SECTION 1 — PERSONAL INFORMATION (dynamic)
// ─────────────────────────────────────────────────
let _personalQuestions = null;

async function renderPersonal() {
  document.getElementById('mainContent').innerHTML =
  '<div class="section-header">' +
    '<div class="section-eyebrow">&#128100; Step 1 of 8</div>' +
    '<div class="section-title">Personal Information</div>' +
    '<div class="section-desc">Tell us about yourself so we can personalise your underwriting assessment.</div>' +
  '</div>' +
  '<div class="card"><div class="card-body"><div class="text-muted text-sm">Loading questions…</div></div></div>';

  const qs = await fetchSectionQuestions('personal');
  _personalQuestions = qs;
  const stored = appData.personalDetails || {};

  const fieldsHtml = '<div class="form-grid">' + qs.map(q => buildFieldHtml(q, stored['sq_' + q.id])).join('') + '</div>';

  document.getElementById('mainContent').innerHTML =
  '<div class="section-header">' +
    '<div class="section-eyebrow">&#128100; Step 1 of 8</div>' +
    '<div class="section-title">Personal Information</div>' +
    '<div class="section-desc">Tell us about yourself so we can personalise your underwriting assessment.</div>' +
  '</div>' +
  '<div class="card">' +
    '<div class="card-header"><span class="card-icon">&#128221;</span><div><div class="card-title">Your Details</div><div class="card-desc">As per your passport or Emirates ID</div></div></div>' +
    '<div class="card-body">' + fieldsHtml + '</div>' +
  '</div>' +
  actionBar('savePersonal()', 'Save &amp; Continue', false);
}

async function savePersonal() {
  const qs = _personalQuestions || [];
  const body = collectSectionAnswers(qs);
  const missing = validateSectionAnswers(qs, body);
  if (missing.length) { toast('Missing: ' + missing.join(', '), 'error'); return; }
  const btn = document.getElementById('nextBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const ok = await saveSection('personal-details', body);
  if (ok) { appData.personalDetails = body; markDone('personal'); nextSection(); }
  else resetNextBtn();
}

// ─────────────────────────────────────────────────
// SECTION 2 — LIFESTYLE (dynamic + BMI widget)
// ─────────────────────────────────────────────────
let _lifestyleQuestions = null;

async function renderLifestyle() {
  document.getElementById('mainContent').innerHTML =
  '<div class="section-header">' +
    '<div class="section-eyebrow">&#127939; Step 2 of 8</div>' +
    '<div class="section-title">Lifestyle Factors</div>' +
    '<div class="section-desc">Help us understand your daily habits and physical health. These factors influence your risk profile.</div>' +
  '</div>' +
  '<div class="card"><div class="card-body"><div class="text-muted text-sm">Loading questions…</div></div></div>';

  const qs = await fetchSectionQuestions('lifestyle');
  _lifestyleQuestions = qs;
  const stored = appData.lifestyle || {};

  // Find height/weight question IDs for BMI widget
  const heightQ = qs.find(q => q.text.toLowerCase().includes('height'));
  const weightQ = qs.find(q => q.text.toLowerCase().includes('weight'));
  const hId = heightQ ? 'sq_' + heightQ.id : null;
  const wId = weightQ ? 'sq_' + weightQ.id : null;

  let fieldsHtml = '<div class="form-grid">';
  qs.forEach(function(q) {
    const fieldId = 'sq_' + q.id;
    const isHeight = hId && fieldId === hId;
    const isWeight = wId && fieldId === wId;
    if (isHeight || isWeight) {
      const reqBadge = q.isMandatory ? ' <span class="req">*</span>' : '';
      fieldsHtml += '<div class="form-group"><label>' + escHtml(q.text) + reqBadge + '</label><input class="field" type="number" id="' + fieldId + '" placeholder="" value="' + escHtml(String(stored[fieldId]||'')) + '" oninput="updateBMI()"></div>';
    } else {
      fieldsHtml += buildFieldHtml(q, stored['sq_' + q.id]);
    }
  });
  fieldsHtml += '</div>';

  const bmiWidget = (hId && wId) ? (
    '<div class="card" style="margin-top:16px">' +
    '<div class="card-header"><span class="card-icon">&#9878;&#65039;</span><div><div class="card-title">BMI</div></div></div>' +
    '<div class="card-body"><div class="form-grid-3">' +
    '<div class="form-group"><label>BMI <span class="hint-text">(auto-calculated)</span></label><input class="field" id="bmi" readonly placeholder="—" value="' + escHtml(String(stored.bmi||'')) + '"></div>' +
    '</div><div id="bmiCard"></div></div></div>'
  ) : '';

  document.getElementById('mainContent').innerHTML =
  '<div class="section-header">' +
    '<div class="section-eyebrow">&#127939; Step 2 of 8</div>' +
    '<div class="section-title">Lifestyle Factors</div>' +
    '<div class="section-desc">Help us understand your daily habits and physical health. These factors influence your risk profile.</div>' +
  '</div>' +
  '<div class="card">' +
    '<div class="card-header"><span class="card-icon">&#128684;</span><div><div class="card-title">Lifestyle Information</div></div></div>' +
    '<div class="card-body">' + fieldsHtml + '</div>' +
  '</div>' +
  bmiWidget +
  actionBar('saveLifestyle()');

  // Restore BMI if already set
  if (hId && wId) {
    const h = parseFloat(stored[hId]);
    const w = parseFloat(stored[wId]);
    if (h > 0 && w > 0) updateBMI();
  }
}

function buildBmiCard(h, w) {
  const bmi = (w / Math.pow(h / 100, 2)).toFixed(1);
  let cat = 'Underweight', color = '#0284c7', pct = 10;
  if (bmi >= 18.5 && bmi < 25) { cat = 'Normal weight'; color = '#16a34a'; pct = 35; }
  else if (bmi >= 25 && bmi < 30) { cat = 'Overweight'; color = '#d97706'; pct = 65; }
  else if (bmi >= 30) { cat = 'Obese'; color = '#dc2626'; pct = 88; }
  return '<div class="bmi-card" style="margin-top:16px">' +
    '<div><div class="bmi-number" style="color:' + color + '">' + bmi + '</div></div>' +
    '<div class="bmi-bar-wrap">' +
      '<div class="bmi-label" style="color:' + color + '">' + cat + '</div>' +
      '<div class="bmi-sub">Underweight &lt;18.5 &middot; Normal 18.5–24.9 &middot; Overweight 25–29.9 &middot; Obese &ge;30</div>' +
      '<div class="bmi-bar-track"><div class="bmi-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
    '</div>' +
  '</div>';
}

function updateBMI() {
  const qs = _lifestyleQuestions || [];
  const heightQ = qs.find(q => q.text.toLowerCase().includes('height'));
  const weightQ = qs.find(q => q.text.toLowerCase().includes('weight'));
  const hEl = heightQ ? document.getElementById('sq_' + heightQ.id) : null;
  const wEl = weightQ ? document.getElementById('sq_' + weightQ.id) : null;
  const h = hEl ? parseFloat(hEl.value) : 0;
  const w = wEl ? parseFloat(wEl.value) : 0;
  const bmiEl = document.getElementById('bmi');
  const card = document.getElementById('bmiCard');
  if (h > 0 && w > 0) {
    const bmi = (w / Math.pow(h / 100, 2)).toFixed(1);
    if (bmiEl) bmiEl.value = bmi;
    if (card) { card.style.display = ''; card.innerHTML = buildBmiCard(h, w); }
  } else {
    if (bmiEl) bmiEl.value = '';
    if (card) card.style.display = 'none';
  }
}

async function saveLifestyle() {
  const qs = _lifestyleQuestions || [];
  const body = collectSectionAnswers(qs);
  const missing = validateSectionAnswers(qs, body);
  if (missing.length) { toast('Missing: ' + missing.join(', '), 'error'); return; }
  // Attach calculated BMI
  const bmiEl = document.getElementById('bmi');
  if (bmiEl && bmiEl.value) body.bmi = parseFloat(bmiEl.value);
  const btn = document.getElementById('nextBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const ok = await saveSection('lifestyle', body);
  if (ok) { appData.lifestyle = body; markDone('lifestyle'); nextSection(); }
  else resetNextBtn();
}

// ─────────────────────────────────────────────────
// SECTION 3 — FAMILY HISTORY (dynamic + search)
// ─────────────────────────────────────────────────
let _familyQuestions = null;
let fhSearchQuery = '';

async function renderFamily() {
  document.getElementById('mainContent').innerHTML =
  '<div class="section-header">' +
    '<div class="section-eyebrow">&#128106; Step 3 of 8</div>' +
    '<div class="section-title">Family History</div>' +
    '<div class="section-desc">Hereditary conditions can affect your underwriting outcome.</div>' +
  '</div>' +
  '<div class="card"><div class="card-body"><div class="text-muted text-sm">Loading questions…</div></div></div>';

  const qs = await fetchSectionQuestions('family');
  _familyQuestions = qs;
  const stored = appData.familyHistory || {};

  fhSearchQuery = '';
  renderFamilyContent(qs, stored);
}

function renderFamilyContent(qs, stored) {
  // Separate MULTI_SELECT (relative mapping) from other questions
  const relativeQs = qs.filter(function(q) { return (q.answerType || '').toUpperCase() === 'MULTI_SELECT'; });
  const otherQs    = qs.filter(function(q) { return (q.answerType || '').toUpperCase() !== 'MULTI_SELECT'; });

  const filteredRel = relativeQs.filter(function(q) {
    if (!fhSearchQuery) return true;
    return q.text.toLowerCase().includes(fhSearchQuery.toLowerCase());
  });
  const filteredOther = otherQs.filter(function(q) {
    if (!fhSearchQuery) return true;
    return q.text.toLowerCase().includes(fhSearchQuery.toLowerCase());
  });

  // Table-style rows: condition name | Mother | Father | Sibling(s)
  const RELATIVE_COLS = ['Mother', 'Father', 'Sibling(s)'];
  const relTableRows = filteredRel.map(function(q) {
    const fieldId = 'sq_' + q.id;
    const storedVal = Array.isArray(stored[fieldId]) ? stored[fieldId] : [];
    const hasAny = storedVal.some(function(v) { return RELATIVE_COLS.includes(v); });
    const cells = RELATIVE_COLS.map(function(rel) {
      const isSelected = storedVal.includes(rel);
      const icon = rel === 'Mother' ? '&#128101;' : rel === 'Father' ? '&#128102;' : '&#128104;&#8205;&#128105;&#8205;&#128103;';
      return '<td style="text-align:center;padding:10px 8px;border-left:1px solid var(--border)">' +
        '<button type="button" data-val="' + escHtml(rel) + '" onclick="toggleRelative(\'' + fieldId + '_ms\',this)" style="width:38px;height:38px;border-radius:50%;border:2px solid ' + (isSelected ? 'var(--primary)' : 'var(--border)') + ';background:' + (isSelected ? 'var(--primary-light)' : '#fff') + ';cursor:pointer;font-size:18px;line-height:1;display:inline-flex;align-items:center;justify-content:center;transition:all .12s" title="' + escHtml(rel) + '">' + icon + '</button>' +
      '</td>';
    }).join('');
    return '<tr id="' + fieldId + '_ms" style="border-bottom:1px solid var(--border);background:' + (hasAny ? '#f0f9ff' : '#fff') + '">' +
      '<td style="padding:12px 16px;font-size:13px;font-weight:' + (hasAny ? '700' : '500') + ';color:var(--text)">' + escHtml(q.text) + '</td>' +
      cells +
    '</tr>';
  }).join('');

  const relTable = filteredRel.length ? (
    '<table style="width:100%;border-collapse:collapse">' +
      '<thead><tr style="border-bottom:2px solid var(--border);background:var(--bg)">' +
        '<th style="padding:10px 16px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)">Condition</th>' +
        RELATIVE_COLS.map(function(r) {
          const icon = r === 'Mother' ? '&#128101;' : r === 'Father' ? '&#128102;' : '&#128104;&#8205;&#128105;&#8205;&#128103;';
          return '<th style="text-align:center;padding:10px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);border-left:1px solid var(--border);min-width:70px">' + icon + '<br>' + r + '</th>';
        }).join('') +
      '</tr></thead>' +
      '<tbody>' + relTableRows + '</tbody>' +
    '</table>'
  ) : '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px">No conditions match your search.</div>';

  // Other questions (text, dropdown, etc.)
  const otherHtml = filteredOther.length
    ? '<div class="card" style="margin-top:16px"><div class="card-header"><span class="card-icon">&#128203;</span><div><div class="card-title">Additional Information</div></div></div><div class="card-body"><div class="form-grid">' +
        filteredOther.map(function(q) { return buildFieldHtml(q, stored['sq_' + q.id]); }).join('') +
      '</div></div></div>'
    : '';

  document.getElementById('mainContent').innerHTML =
  '<div class="section-header">' +
    '<div class="section-eyebrow">&#128106; Step 3 of 8</div>' +
    '<div class="section-title">Family History</div>' +
    '<div class="section-desc">Tap the family member icon next to any condition that has been diagnosed in a first-degree relative.</div>' +
  '</div>' +
  '<div class="alert alert-info" style="margin-bottom:16px"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Tap a family member circle to mark that relative. Tap again to deselect. Only first-degree relatives (parents, siblings).</div>' +
  '<div class="card">' +
    '<div class="card-body" style="padding-bottom:12px">' +
      '<div class="disease-search-wrap">' +
        '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
        '<input type="text" class="disease-search" id="fhSearch" placeholder="Search conditions, e.g. Diabetes, Cancer, Heart…" oninput="filterFhList()" value="' + escHtml(fhSearchQuery) + '">' +
      '</div>' +
    '</div>' +
    '<div style="overflow-x:auto">' + relTable + '</div>' +
  '</div>' +
  otherHtml +
  actionBar('saveFamily()');
}

function toggleRelative(rowId, btn) {
  const row = document.getElementById(rowId);
  if (!row) return;
  const isSelected = btn.style.borderColor.includes('primary') || btn.style.background.includes('primary');
  // Toggle visual
  btn.style.borderColor = isSelected ? 'var(--border)' : 'var(--primary)';
  btn.style.background  = isSelected ? '#fff' : 'var(--primary-light)';
  // Update row highlight
  const anySelected = Array.from(row.querySelectorAll('button')).some(function(b) {
    return b.style.background.includes('primary');
  });
  row.style.background = anySelected ? '#f0f9ff' : '#fff';
  const condCell = row.querySelector('td:first-child');
  if (condCell) condCell.style.fontWeight = anySelected ? '700' : '500';
}

function filterFhList() {
  fhSearchQuery = document.getElementById('fhSearch') ? document.getElementById('fhSearch').value : '';
  renderFamilyContent(_familyQuestions || [], appData.familyHistory || {});
}

async function saveFamily() {
  const qs = _familyQuestions || [];
  const body = {};
  qs.forEach(function(q) {
    const fieldId = 'sq_' + q.id;
    const type = (q.answerType || '').toUpperCase();
    if (type === 'MULTI_SELECT') {
      const selected = [];
      // New table layout: buttons inside the row with data-val
      const row = document.getElementById(fieldId + '_ms');
      if (row) {
        row.querySelectorAll('button').forEach(function(b) {
          if (b.style.background.includes('primary') || b.style.borderColor.includes('primary')) {
            selected.push(b.dataset.val);
          }
        });
      } else {
        // Fallback: old pill layout
        document.querySelectorAll('#' + fieldId + '_ms .pill.selected').forEach(function(b) { selected.push(b.dataset.val); });
      }
      body[fieldId] = selected;
    } else {
      const el = document.getElementById(fieldId);
      body[fieldId] = el ? el.value.trim() : '';
    }
  });
  const btn = document.getElementById('nextBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const ok = await saveSection('family-history', body);
  if (ok) { appData.familyHistory = body; markDone('family'); nextSection(); }
  else resetNextBtn();
}

  { key:'recentHospitalisation',label:'Have you been hospitalised in the last 3 years?',          sub:'Inpatient stays of more than 24 hours',                    yesGood:false },

  { key:'chronicCondition',     label:'Have you been diagnosed with any chronic medical condition?', sub:'Diabetes, hypertension, heart disease, etc.',            yesGood:false },

let discAnswers = {};
// null = not answered, 'yes' = in good health (skip conditions), 'no' = needs assessment
let goodHealthAnswer = null;

function renderDisclosure() {

  else if (disc.inGoodHealth === false) goodHealthAnswer = 'no';

  '<div class="section-header">' +
    '<div class="section-eyebrow">&#129658; Step 5 of 8</div>' +
    '<div class="section-title">Disclosure of Good Health</div>' +
    '<div class="section-desc">Answer each question honestly. Your answers are legally binding and form part of your insurance contract.</div>' +
  '</div>' +
  '<div class="alert alert-warning" style="margin-bottom:24px">' +
    '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' +

  '</div>' +

    '<div style="font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px">Are you currently in good health?</div>' +
    '<div style="font-size:13px;color:var(--text-muted);margin-bottom:20px">No known significant medical conditions, not on long-term medication, no recent hospitalisations.</div>' +
    '<div style="display:flex;gap:12px">' +
      '<button type="button" id="ghYesBtn" onclick="setGoodHealth(\'yes\')" style="' + gatewayBtnStyle(goodHealthAnswer === 'yes', true) + '">&#10003; Yes — I am in good health</button>' +
      '<button type="button" id="ghNoBtn"  onclick="setGoodHealth(\'no\')"  style="' + gatewayBtnStyle(goodHealthAnswer === 'no', false) + '">&#9888; No — I have medical conditions to declare</button>' +

function gatewayBtnStyle(isSelected, isYes) {
  if (isSelected && isYes)  return 'padding:12px 24px;border-radius:10px;border:2px solid #16a34a;background:#dcfce7;color:#15803d;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:all .12s';
  if (isSelected && !isYes) return 'padding:12px 24px;border-radius:10px;border:2px solid var(--primary);background:var(--primary-light);color:var(--primary);font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:all .12s';
  return 'padding:12px 24px;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--text-muted);font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;transition:all .12s';
}

function renderGoodHealthMsg() {
  return '<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:20px 24px;display:flex;gap:14px;align-items:flex-start">' +
    '<div style="font-size:24px;line-height:1;flex-shrink:0">&#10004;&#65039;</div>' +
    '<div><div style="font-size:15px;font-weight:700;color:#15803d;margin-bottom:4px">Great — no medical assessment required</div>' +
    '<div style="font-size:13px;color:#166534">Since you are in good health, you can proceed directly to Documents. The Medical Conditions section will be skipped.</div></div>' +
  '</div>';
}

function renderDiscDetailBlock(disc) {
  return '<div style="margin-bottom:8px;font-size:13px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">Additional Health Questions</div>' +
  '<div id="discQuestionsWrap">' + renderDiscQuestions(disc) + '</div>';
}

function setGoodHealth(val) {
  goodHealthAnswer = val;
  const disc = appData.disclosures || {};
  // Update gateway card border
  const gw = document.getElementById('discGateway');
  if (gw) gw.style.borderColor = val === 'yes' ? '#16a34a' : 'var(--primary)';
  // Update button styles
  const yBtn = document.getElementById('ghYesBtn');
  const nBtn = document.getElementById('ghNoBtn');
  if (yBtn) yBtn.style.cssText = gatewayBtnStyle(val === 'yes', true);
  if (nBtn) nBtn.style.cssText = gatewayBtnStyle(val === 'no', false);
  // Show/hide sections
  const detail = document.getElementById('discDetailSection');
  const msg = document.getElementById('discGoodHealthMsg');
  if (detail) detail.innerHTML = val === 'no' ? renderDiscDetailBlock(disc) : '';
  if (msg) msg.innerHTML = val === 'yes' ? renderGoodHealthMsg() : '';
  // Hide/show conditions in nav
  updateConditionsNavVisibility();
}

function renderDiscQuestions(disc) {
  return DISC_QUESTIONS.map(function(q, idx) {
    const ans = discAnswers[q.key] || '';
    const isYes = ans === 'Yes';
    const isNo = ans === 'No';
    const needsDetail = isYes && !q.yesGood;
    const detailFields = getDiscDetailFields(q.key, disc);

    return '<div class="disc-q-card" id="dqc_' + q.key + '" style="background:#fff;border:1.5px solid ' + (ans ? (needsDetail ? 'var(--warning)' : 'var(--success)') : 'var(--border)') + ';border-radius:12px;padding:20px 24px;margin-bottom:14px;transition:border-color .15s">' +
      '<div style="display:flex;align-items:flex-start;gap:16px">' +
        '<div style="flex:1">' +
          '<div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px">' + escHtml(q.label) + '</div>' +
          '<div style="font-size:13px;color:var(--text-muted)">' + escHtml(q.sub) + '</div>' +
        '</div>' +
        '<div style="display:flex;gap:8px;flex-shrink:0;margin-top:2px">' +
          '<button type="button" class="disc-ans-btn ' + (isYes ? 'selected-yes' : '') + '" onclick="setDiscAnswer(\'' + q.key + '\',\'Yes\')" style="padding:8px 20px;border-radius:999px;border:1.5px solid ' + (isYes ? '#16a34a' : 'var(--border)') + ';background:' + (isYes ? '#dcfce7' : '#fff') + ';color:' + (isYes ? '#16a34a' : 'var(--text-muted)') + ';font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:all .12s">Yes</button>' +
          '<button type="button" class="disc-ans-btn ' + (isNo ? 'selected-no' : '') + '" onclick="setDiscAnswer(\'' + q.key + '\',\'No\')" style="padding:8px 20px;border-radius:999px;border:1.5px solid ' + (isNo ? 'var(--primary)' : 'var(--border)') + ';background:' + (isNo ? 'var(--primary-light)' : '#fff') + ';color:' + (isNo ? 'var(--primary)' : 'var(--text-muted)') + ';font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:all .12s">No</button>' +
        '</div>' +
      '</div>' +
      (needsDetail && detailFields ? '<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">' + detailFields + '</div>' : '') +
    '</div>';
  }).join('');
}

function getDiscDetailFields(key, disc) {
  const d = disc || {};
  if (key === 'ongoingMedication') return '<div class="form-group"><label style="font-size:12px;font-weight:700">List current medications &amp; dosage</label><textarea class="field" id="medicationDetails" placeholder="e.g. Metformin 500mg twice daily, Lisinopril 10mg once daily…" style="min-height:72px">' + escHtml(d.medicationDetails||'') + '</textarea></div>';
  if (key === 'recentHospitalisation') return '<div class="form-grid"><div class="form-group"><label style="font-size:12px;font-weight:700">Reason for hospitalisation</label><input class="field" type="text" id="hospitalisationReason" placeholder="e.g. Surgery, acute illness" value="' + escHtml(d.hospitalisationReason||'') + '"></div><div class="form-group"><label style="font-size:12px;font-weight:700">Date &amp; duration</label><input class="field" type="text" id="hospitalisationDetails" placeholder="e.g. March 2023, 5 days" value="' + escHtml(d.hospitalisationDetails||'') + '"></div></div>';
  if (key === 'upcomingSurgery') return '<div class="form-group"><label style="font-size:12px;font-weight:700">Procedure details &amp; expected date</label><input class="field" type="text" id="surgeryDetails" placeholder="e.g. Knee replacement, Q3 2025" value="' + escHtml(d.surgeryDetails||'') + '"></div>';
  if (key === 'mentalHealthHistory') return '<div class="form-group"><label style="font-size:12px;font-weight:700">Condition &amp; treatment period</label><input class="field" type="text" id="mentalHealthDetails" placeholder="e.g. Depression, CBT therapy 2021–2022" value="' + escHtml(d.mentalHealthDetails||'') + '"></div>';
  if (key === 'chronicCondition') return '<div class="form-group"><label style="font-size:12px;font-weight:700">Please specify the condition(s)</label><input class="field" type="text" id="chronicConditionDetails" placeholder="e.g. Type 2 Diabetes, Hypertension" value="' + escHtml(d.chronicConditionDetails||'') + '"></div>';
  if (key === 'substanceHistory') return '<div class="form-group"><label style="font-size:12px;font-weight:700">Details &amp; treatment period</label><input class="field" type="text" id="substanceDetails" placeholder="e.g. Alcohol, rehab 2019" value="' + escHtml(d.substanceDetails||'') + '"></div>';
  return '';
}

function setDiscAnswer(key, value) {
  discAnswers[key] = value;
  const disc = appData.disclosures || {};
  const wrap = document.getElementById('discQuestionsWrap');
  if (wrap) wrap.innerHTML = renderDiscQuestions(disc);
}

function updateConditionsNavVisibility() {
  // When good health = yes, mark conditions as skipped/done so nav shows it handled
  // We do NOT remove it from nav — just keep state consistent on save
}

async function saveDisclosure() {
  if (!goodHealthAnswer) { toast('Please answer the good health question first', 'error'); return; }
  if (goodHealthAnswer === 'no') {
    const unanswered = DISC_QUESTIONS.filter(function(q) { return !discAnswers[q.key]; });
    if (unanswered.length) { toast('Please answer all questions. Unanswered: ' + unanswered.map(function(q) { return q.label.split('?')[0]; }).join('; '), 'error'); return; }
  }
  const body = { inGoodHealth: goodHealthAnswer === 'yes' };
  if (goodHealthAnswer === 'no') {
    DISC_QUESTIONS.forEach(function(q) { body[q.key] = discAnswers[q.key] === 'Yes'; });
    body.medicationDetails = val('medicationDetails');
    body.hospitalisationDetails = val('hospitalisationDetails');
    body.hospitalisationReason = val('hospitalisationReason');
    body.surgeryDetails = val('surgeryDetails');
    body.mentalHealthDetails = val('mentalHealthDetails');
    body.chronicConditionDetails = val('chronicConditionDetails');
    body.substanceDetails = val('substanceDetails');
  }
  const btn = document.getElementById('nextBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const ok = await saveSection('disclosures', body);
  if (ok) {
    appData.disclosures = body;
    markDone('disclosure');
    if (goodHealthAnswer === 'yes') {
      // Skip conditions — mark it complete automatically and go straight to documents
      completed.add('conditions');
      selectedDiseases.clear();
      currentSection = 'documents';
      renderNav();
      renderSection();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      nextSection();
    }
  } else resetNextBtn();
}

let assessmentStatus = {}; // id -> 'pending' | 'completed'
let activeAssessmentId = null;
let cohortsList = [];
let selectedCohortId = null; // null = "All" (no filter)
let condDiseaseSearch = '';

async function renderConditions() {
  document.getElementById('mainContent').innerHTML =
  '<div class="section-header">' +
    '<div class="section-eyebrow">&#128138; Step 6 of 8</div>' +
    '<div class="section-title">Medical Conditions</div>' +
    '<div class="section-desc">Loading…</div>' +
  '</div><div class="card"><div class="card-body"><div class="text-muted text-sm">Loading conditions…</div></div></div>';

  try {
    const [cr, dr] = await Promise.all([fetch('/api/cohorts'), fetch('/api/diseases')]);
    const cd = await cr.json(); cohortsList = (cd.data || []).filter(function(c) { return c.isActive; });
    const dd = await dr.json(); diseasesList = (dd.data || []).filter(function(d) { return d.isActive; });
  } catch(e) { cohortsList = []; diseasesList = []; }

  // Don't auto-select a cohort — start with "All"
  if (selectedCohortId && !cohortsList.find(function(c) { return c.id === selectedCohortId; })) selectedCohortId = null;
  condDiseaseSearch = '';
  renderConditionsDashboard();
}

function renderConditionsDashboard() {
  // ── Category filter tabs (All + each cohort) ──
  const allActive = !selectedCohortId;
  const cohortTabsHtml =
    '<button type="button" onclick="selectCondCohort(null)" style="' + cohortTabStyle(allActive) + '">All</button>' +
    cohortsList.map(function(c) {
      return '<button type="button" onclick="selectCondCohort(\'' + c.id + '\')" style="' + cohortTabStyle(c.id === selectedCohortId) + '">' + escHtml(c.name) + '</button>';
    }).join('');

  // ── Filtered disease list ──────────────────────
  // Global search across ALL diseases; cohort tab is an optional secondary filter
  const q = condDiseaseSearch.toLowerCase();
  const visibleDiseases = diseasesList.filter(function(d) {
    const matchesSearch = !q || d.name.toLowerCase().includes(q);
    const matchesCohort = !selectedCohortId || d.cohortId === selectedCohortId;
    return matchesSearch && matchesCohort;
  });

  // Group by cohort for display when no search term and no cohort filter
  const showGrouped = !q && !selectedCohortId;

  let diseaseRowsHtml = '';
  if (!visibleDiseases.length) {
    diseaseRowsHtml = '<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px">' +
      (q ? 'No conditions match "' + escHtml(condDiseaseSearch) + '".' : 'No conditions available.') + '</div>';
  } else if (showGrouped) {
    // Render with cohort group headings
    cohortsList.forEach(function(c) {
      const group = visibleDiseases.filter(function(d) { return d.cohortId === c.id; });
      if (!group.length) return;
      diseaseRowsHtml += '<div style="padding:8px 16px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);background:var(--bg);border-bottom:1px solid var(--border)">' + escHtml(c.name) + '</div>';
      group.forEach(function(d) { diseaseRowsHtml += diseaseRowHtml(d); });
    });
  } else {
    visibleDiseases.forEach(function(d) { diseaseRowsHtml += diseaseRowHtml(d); });
  }

  // ── Selected conditions dashboard ─────────────
  const dashCards = Array.from(selectedDiseases).map(function(id) {
    const d = diseasesList.find(function(x) { return x.id === id; });
    const isDone = assessmentStatus[id] === 'completed';
    const statusBadge = isDone
      ? '<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#16a34a;background:#dcfce7;padding:3px 10px;border-radius:999px">&#10003; Assessment complete</span>'
      : '<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#d97706;background:#fef3c7;padding:3px 10px;border-radius:999px">&#9888; Assessment required</span>';
    const btnStyle = isDone
      ? 'background:var(--bg);border:1.5px solid var(--border);color:var(--text-muted)'
      : 'background:var(--primary);border:1.5px solid var(--primary);color:#fff;box-shadow:0 2px 8px rgba(26,86,219,.2)';
    return '<div style="display:flex;align-items:center;gap:14px;padding:14px 18px;background:#fff;border:1.5px solid ' + (isDone ? '#86efac' : 'var(--border)') + ';border-radius:12px;margin-bottom:8px">' +
      '<div style="flex:1;min-width:0">' +
        '<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px">' + escHtml(d ? d.name : id) + '</div>' +
        statusBadge +
      '</div>' +
      '<div style="display:flex;gap:8px;flex-shrink:0">' +
        '<button onclick="openAssessment(\'' + id + '\')" style="' + btnStyle + ';padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">' + (isDone ? '&#9998; Edit' : '&#9654; Start Assessment') + '</button>' +
        '<button onclick="removeCondition(\'' + id + '\')" style="background:none;border:1.5px solid var(--border);color:var(--text-muted);padding:8px 10px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit" title="Remove">&times;</button>' +
      '</div>' +
    '</div>';
  }).join('');

  const hasSelected = selectedDiseases.size > 0;

  document.getElementById('mainContent').innerHTML =
  '<div class="section-header">' +
    '<div class="section-eyebrow">&#128138; Step 6 of 8</div>' +
    '<div class="section-title">Medical Conditions</div>' +
    '<div class="section-desc">Search for your diagnosed conditions and complete a short questionnaire for each one.</div>' +
  '</div>' +

  // Picker card
  '<div class="card" style="margin-bottom:20px">' +
    '<div class="card-header">' +
      '<span class="card-icon">&#128269;</span>' +
      '<div><div class="card-title">Find &amp; Add a Condition</div><div class="card-desc">Search by name, or browse by category</div></div>' +
    '</div>' +
    '<div class="card-body" style="padding-bottom:0">' +
      // Global search — prominent, top of card
      '<div class="disease-search-wrap" style="margin-bottom:12px">' +
        '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
        '<input type="text" class="disease-search" id="condDiseaseSearch" placeholder="Search any condition — Hypertension, Diabetes, Asthma…" value="' + escHtml(condDiseaseSearch) + '" oninput="filterCondDiseases()" autofocus>' +
      '</div>' +
      // Category filter tabs
      '<div style="display:flex;flex-wrap:wrap;gap:6px;padding-bottom:12px">' + cohortTabsHtml + '</div>' +
    '</div>' +
    // Results list
    '<div style="max-height:300px;overflow-y:auto;border-top:1px solid var(--border)">' + diseaseRowsHtml + '</div>' +
  '</div>' +

  // Dashboard — selected conditions
  (hasSelected
    ? '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:10px">Your Conditions — Complete Each Assessment</div>' + dashCards
    : ''
  ) +
  actionBar('saveConditions()');

  ensureAssessmentModal();
}

function cohortTabStyle(isActive) {
  return 'padding:5px 13px;border-radius:999px;border:1.5px solid ' + (isActive ? 'var(--primary)' : 'var(--border)') +
    ';background:' + (isActive ? 'var(--primary-light)' : '#fff') +
    ';color:' + (isActive ? 'var(--primary)' : 'var(--text-muted)') +
    ';font-weight:' + (isActive ? '700' : '500') +
    ';font-size:12px;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap';
}

function diseaseRowHtml(d) {
  const isAdded = selectedDiseases.has(d.id);
  const cohort  = cohortsList.find(function(c) { return c.id === d.cohortId; });
  return '<div style="display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);transition:background .1s" onmouseenter="this.style.background=\'var(--bg)\'" onmouseleave="this.style.background=\'\'">' +
    '<div style="flex:1;min-width:0">' +
      '<div style="font-size:13px;font-weight:600;color:var(--text)">' + escHtml(d.name) + '</div>' +
      (cohort ? '<div style="font-size:11px;color:var(--text-muted);margin-top:1px">' + escHtml(cohort.name) + '</div>' : '') +
    '</div>' +
    (isAdded
      ? '<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#16a34a;background:#dcfce7;padding:4px 10px;border-radius:6px">&#10003; Added</span>'
      : '<button onclick="addCondition(\'' + d.id + '\')" style="padding:6px 14px;border-radius:7px;border:1.5px solid var(--primary);background:var(--primary-light);color:var(--primary);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0">+ Add</button>') +
  '</div>';
}

function selectCondCohort(id) {
  selectedCohortId = id;
  // Don't clear the search term — keep context
  renderConditionsDashboard();
}

function filterCondDiseases() {
  condDiseaseSearch = document.getElementById('condDiseaseSearch') ? document.getElementById('condDiseaseSearch').value : '';
  // When user types, clear cohort filter so search is truly global
  if (condDiseaseSearch) selectedCohortId = null;
  renderConditionsDashboard();
}

function addCondition(id) {
  selectedDiseases.add(id);
  if (!assessmentStatus[id]) assessmentStatus[id] = 'pending';
  // Don't re-render full page — just open assessment immediately
  openAssessment(id);
}

function removeCondition(id) {
  selectedDiseases.delete(id);
  delete assessmentStatus[id];
  delete questionsData[id]; // clear cache so it re-fetches if re-added
  renderConditionsDashboard();
}

function ensureAssessmentModal() {
  if (document.getElementById('assessmentModal')) return;
  const modal = document.createElement('div');
  modal.id = 'assessmentModal';
  modal.style.cssText = 'display:none;position:fixed;inset:0;z-index:500;background:rgba(15,23,42,.45);backdrop-filter:blur(2px)';
  modal.innerHTML =
    '<div id="assessmentPanel" style="position:absolute;right:0;top:0;bottom:0;width:min(640px,100vw);background:#fff;box-shadow:-8px 0 40px rgba(0,0,0,.16);display:flex;flex-direction:column;overflow:hidden">' +
      // Header
      '<div style="padding:20px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0">' +
        '<div style="display:flex;align-items:flex-start;gap:12px">' +
          '<div style="flex:1;min-width:0">' +
            '<div id="assessmentTitle" style="font-size:17px;font-weight:800;color:var(--text);line-height:1.3"></div>' +
            '<div id="assessmentMeta" style="font-size:12px;color:var(--text-muted);margin-top:4px"></div>' +
          '</div>' +
          '<button onclick="closeAssessment()" style="background:var(--bg);border:1.5px solid var(--border);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0">&times;</button>' +
        '</div>' +
        // Progress bar
        '<div id="assessmentProgressWrap" style="margin-top:14px;display:none">' +
          '<div style="display:flex;justify-content:space-between;margin-bottom:5px">' +
            '<span style="font-size:11px;font-weight:600;color:var(--text-muted)" id="assessmentProgressLabel"></span>' +
            '<span style="font-size:11px;font-weight:700;color:var(--primary)" id="assessmentProgressPct"></span>' +
          '</div>' +
          '<div style="height:4px;background:var(--border);border-radius:999px;overflow:hidden">' +
            '<div id="assessmentProgressBar" style="height:100%;background:var(--primary);border-radius:999px;transition:width .3s"></div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      // Body
      '<div id="assessmentBody" style="flex:1;overflow-y:auto"></div>' +
      // Footer
      '<div style="padding:16px 24px;border-top:1px solid var(--border);background:#fff;flex-shrink:0;display:flex;gap:10px;justify-content:space-between;align-items:center">' +
        '<div id="assessmentAnsweredCount" style="font-size:12px;color:var(--text-muted)"></div>' +
        '<div style="display:flex;gap:10px">' +
          '<button onclick="closeAssessment()" style="padding:10px 20px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--text-muted);font-weight:600;cursor:pointer;font-family:inherit">Cancel</button>' +
          '<button onclick="saveAssessment()" style="padding:10px 24px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(26,86,219,.3)">&#10003; Save Assessment</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  document.body.appendChild(modal);
}

// ── Assessment drawer ─────────────────────────────
async function openAssessment(id) {
  ensureAssessmentModal();
  activeAssessmentId = id;

  // Always fetch fresh — never rely on potentially empty cached result
  document.getElementById('assessmentModal').style.display = '';
  document.body.style.overflow = 'hidden';
  const disease = diseasesList.find(function(x) { return x.id === id; });
  const cohort  = disease ? cohortsList.find(function(c) { return c.id === disease.cohortId; }) : null;
  document.getElementById('assessmentTitle').textContent = disease ? disease.name : id;
  document.getElementById('assessmentMeta').textContent  = cohort ? cohort.name + ' · Condition-specific questionnaire' : 'Condition-specific questionnaire';
  document.getElementById('assessmentBody').innerHTML = '<div style="padding:32px 24px;text-align:center;color:var(--text-muted);font-size:13px">Loading questions…</div>';
  document.getElementById('assessmentProgressWrap').style.display = 'none';
  document.getElementById('assessmentAnsweredCount').textContent = '';

  try {
    const r = await fetch('/api/diseases/' + id + '/questions');
    const data = await r.json();
    questionsData[id] = (data.data || []).filter(function(q) { return q.isActive !== false; });
  } catch(e) { questionsData[id] = []; }

  document.getElementById('assessmentBody').innerHTML = buildAssessmentForm(id);
  updateAssessmentProgress(id);
}

function closeAssessment() {
  document.getElementById('assessmentModal').style.display = 'none';
  document.body.style.overflow = '';
  activeAssessmentId = null;
}

function updateAssessmentProgress(id) {
  const qs = questionsData[id] || [];
  const wrap = document.getElementById('assessmentProgressWrap');
  const label = document.getElementById('assessmentProgressLabel');
  const pct   = document.getElementById('assessmentProgressPct');
  const bar   = document.getElementById('assessmentProgressBar');
  const foot  = document.getElementById('assessmentAnsweredCount');
  if (!qs.length || !wrap) return;

  let answered = 0;
  qs.forEach(function(q) {
    const key = id + '_' + q.id;
    const v = questionAnswers[key];
    if (v !== undefined && v !== '' && !(Array.isArray(v) && !v.length)) answered++;
  });

  const p = Math.round((answered / qs.length) * 100);
  wrap.style.display = '';
  label.textContent  = answered + ' of ' + qs.length + ' answered';
  pct.textContent    = p + '%';
  bar.style.width    = p + '%';
  if (foot) foot.textContent = answered === qs.length ? '✓ All questions answered' : (qs.length - answered) + ' question' + (qs.length - answered !== 1 ? 's' : '') + ' remaining';
}

function buildAssessmentForm(id) {
  const qs = questionsData[id] || [];
  if (!qs.length) {
    // This should not happen if questionnaires are seeded — show a diagnostic note
    return '<div style="padding:32px 24px">' +
      '<div style="background:#fef3c7;border:1.5px solid #fcd34d;border-radius:10px;padding:16px 20px">' +
        '<div style="font-size:14px;font-weight:700;color:#92400e;margin-bottom:4px">No questions loaded</div>' +
        '<div style="font-size:13px;color:#b45309">The questionnaire for this condition could not be loaded. Please check your Admin Portal configuration and ensure questions are configured and active for this disease.</div>' +
      '</div>' +
    '</div>';
  }

  return qs.map(function(q, idx) {
    const key = id + '_' + q.id;
    const stored = questionAnswers[key] !== undefined ? questionAnswers[key] : '';
    // Normalise type — replace ALL underscores before lowercasing
    const rawType = (q.answerType || q.type || 'text');
    const qtype = rawType.toLowerCase().replace(/_/g, '');
    // isMulti: MULTI_SELECT type
    const isMulti = qtype === 'multiselect';
    const opts = q.options || [];

    const label = '<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:12px">' +
      '<span style="display:inline-flex;width:24px;height:24px;background:var(--primary-light);color:var(--primary);border-radius:50%;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:1px">' + (idx+1) + '</span>' +
      '<div style="font-size:14px;font-weight:700;color:var(--text);line-height:1.4">' + escHtml(q.text) + '</div>' +
    '</div>';

    const answered = stored !== '' && !(Array.isArray(stored) && !stored.length);
    const wrap = function(inner) {
      return '<div style="padding:18px 24px;border-bottom:1px solid var(--border);background:' + (answered ? '#fafffe' : '#fff') + '">' + label + inner + '</div>';
    };
    const onchange = 'updateAssessmentProgress(\'' + id + '\')';

    // NUMBER
    if (qtype === 'number') {
      return wrap('<input class="field" type="number" id="qa_' + key + '" value="' + escHtml(String(stored)) + '" placeholder="Enter a number…" style="max-width:200px" oninput="questionAnswers[\'' + key + '\']=this.value;' + onchange + '">');
    }
    // DATE
    if (qtype === 'date') {
      return wrap('<input class="field" type="date" id="qa_' + key + '" value="' + escHtml(String(stored)) + '" style="max-width:220px" onchange="questionAnswers[\'' + key + '\']=this.value;' + onchange + '">');
    }
    // TEXT
    if (qtype === 'text') {
      return wrap('<input class="field" type="text" id="qa_' + key + '" value="' + escHtml(String(stored)) + '" placeholder="Type your answer…" oninput="questionAnswers[\'' + key + '\']=this.value;' + onchange + '">');
    }
    // YES_NO — normalised qtype is 'yesno' after stripping underscore
    if (qtype === 'yesno' || qtype === 'boolean') {
      const isY = stored === 'Yes', isN = stored === 'No';
      return wrap(
        '<div style="display:flex;gap:10px">' +
          chipBtn(key, 'Yes', isY, false) +
          chipBtn(key, 'No', isN, false) +
        '</div>'
      );
    }
    // DROPDOWN — render as chip group
    if (qtype === 'dropdown' || qtype === 'select') {
      if (!opts.length) return wrap('<input class="field" type="text" id="qa_' + key + '" value="' + escHtml(String(stored)) + '" placeholder="Type your answer…" oninput="questionAnswers[\'' + key + '\']=this.value;' + onchange + '">');
      const optHtml = opts.map(function(o) { return chipBtn(key, o, stored === o, false); }).join('');
      return wrap('<div id="qg_' + key + '" style="display:flex;flex-wrap:wrap;gap:8px">' + optHtml + '</div>');
    }
    // MULTI_SELECT — normalised qtype is 'multiselect'
    if (isMulti) {
      const storedArr = Array.isArray(stored) ? stored : (stored ? [stored] : []);
      const optHtml = opts.map(function(o) { return chipBtn(key, o, storedArr.includes(o), true); }).join('');
      return wrap(
        '<div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Select all that apply</div>' +
        '<div id="qg_' + key + '" style="display:flex;flex-wrap:wrap;gap:8px">' + optHtml + '</div>'
      );
    }
    // Fallback: treat as text
    return wrap('<input class="field" type="text" id="qa_' + key + '" value="' + escHtml(String(stored)) + '" placeholder="Type your answer…" oninput="questionAnswers[\'' + key + '\']=this.value;' + onchange + '">');
  }).join('');
}

function chipBtn(key, value, isSelected, isMulti) {
  const sel = isSelected;
  return '<button type="button" ' +
    'onclick="selectAssessmentAnswer(\'' + key + '\',\'' + value.replace(/'/g, "\\'") + '\',' + isMulti + ',this)" ' +
    'style="padding:10px 20px;border-radius:999px;border:1.5px solid ' + (sel ? 'var(--primary)' : 'var(--border)') + ';' +
    'background:' + (sel ? 'var(--primary-light)' : '#fff') + ';' +
    'color:' + (sel ? 'var(--primary)' : 'var(--text-muted)') + ';' +
    'font-weight:' + (sel ? '700' : '500') + ';' +
    'font-size:13px;cursor:pointer;font-family:inherit;transition:all .12s">' +
    escHtml(value) +
  '</button>';
}

function selectAssessmentAnswer(key, value, isMulti, btn) {
  if (isMulti) {
    const stored = Array.isArray(questionAnswers[key]) ? questionAnswers[key] : [];
    const idx = stored.indexOf(value);
    if (idx > -1) stored.splice(idx, 1); else stored.push(value);
    questionAnswers[key] = stored;
    btn.style.borderColor = stored.includes(value) ? 'var(--primary)' : 'var(--border)';
    btn.style.background  = stored.includes(value) ? 'var(--primary-light)' : '#fff';
    btn.style.color       = stored.includes(value) ? 'var(--primary)' : 'var(--text-muted)';
    btn.style.fontWeight  = stored.includes(value) ? '700' : '500';
  } else {
    questionAnswers[key] = value;
    // Update all sibling chips in this question's group
    const group = document.getElementById('qg_' + key);
    if (group) {
      group.querySelectorAll('button').forEach(function(b) {
        const isThis = b.textContent.trim() === value;
        b.style.borderColor = isThis ? 'var(--primary)' : 'var(--border)';
        b.style.background  = isThis ? 'var(--primary-light)' : '#fff';
        b.style.color       = isThis ? 'var(--primary)' : 'var(--text-muted)';
        b.style.fontWeight  = isThis ? '700' : '500';
      });
    } else {
      // Yes/No buttons — update parent row siblings
      const parent = btn.parentElement;
      if (parent) parent.querySelectorAll('button').forEach(function(b) {
        const isThis = b.textContent.trim() === value;
        b.style.borderColor = isThis ? 'var(--primary)' : 'var(--border)';
        b.style.background  = isThis ? 'var(--primary-light)' : '#fff';
        b.style.color       = isThis ? 'var(--primary)' : 'var(--text-muted)';
        b.style.fontWeight  = isThis ? '700' : '500';
      });
    }
  }
  // Update progress after any chip selection
  if (activeAssessmentId) updateAssessmentProgress(activeAssessmentId);
}

function saveAssessment() {
  const id = activeAssessmentId;
  if (!id) return;
  assessmentStatus[id] = 'completed';
  closeAssessment();
  // Re-render the dashboard so the card flips to "Completed"
  renderConditionsDashboard();
  toast('Assessment saved', 'success');
}

async function saveConditions() {
  const btn = document.getElementById('nextBtn');
  const pendingAssessments = Array.from(selectedDiseases).filter(function(id) { return assessmentStatus[id] !== 'completed'; });
  if (selectedDiseases.size > 0 && pendingAssessments.length) {
    const names = pendingAssessments.map(function(id) { const d = diseasesList.find(function(x) { return x.id === id; }); return d ? d.name : id; });
    toast('Please complete assessments for: ' + names.join(', '), 'error'); return;
  }
  btn.disabled = true; btn.textContent = 'Saving…';
  const diseasesArr = Array.from(selectedDiseases).map(function(id) { return { id: id, answered: true }; });
  const answers = Object.entries(questionAnswers).map(function(entry) {
    const k = entry[0], v = entry[1];
    const parts = k.split('_');
    return { diseaseId: parts[0], questionId: parts[1], answer: Array.isArray(v) ? v.join(', ') : v };
  });
  const ok = await saveSection('answers', { diseases: diseasesArr, answers: answers });
  if (ok) { markDone('conditions'); nextSection(); }
  else resetNextBtn();
}

function docSectionHtml(type, icon, title, hint, required) {
  return '<div class="doc-section">' +
    '<div class="doc-section-header"><span style="font-size:18px">' + icon + '</span><span class="doc-section-title">' + title + (required ? ' <span style="color:var(--danger)">*</span>' : '') + '</span><span class="doc-count" id="cnt_' + type + '">0</span></div>' +
    '<div class="drop-zone" id="dz_' + type + '" onclick="triggerUpload(\'' + type + '\')" ondragover="event.preventDefault();this.classList.add(\'dragging\')" ondragleave="this.classList.remove(\'dragging\')" ondrop="onDrop(event,\'' + type + '\')">' +
      '<div class="drop-icon">&#9729;&#65039;</div>' +
      '<div class="drop-label">Click to upload</div>' +
      '<div class="drop-sub">' + hint + ' &middot; PDF, JPG, PNG</div>' +
    '</div>' +
    '<input type="file" id="fu_' + type + '" style="display:none" accept=".pdf,.jpg,.jpeg,.png" multiple onchange="onFileChange(event,\'' + type + '\')">' +
    '<div class="file-list" id="fl_' + type + '"></div>' +
  '</div>';
}

function triggerUpload(type) { const el = document.getElementById('fu_' + type); if (el) el.click(); }

function onDrop(e, type) {
  e.preventDefault();
  const dz = document.getElementById('dz_' + type);
  if (dz) dz.classList.remove('dragging');
  handleFiles(Array.from(e.dataTransfer.files), type);
}

function onFileChange(e, type) { handleFiles(Array.from(e.target.files), type); }

function handleFiles(files, type) {
  files.forEach(function(f) {
    if (f.size > 10 * 1024 * 1024) { toast(f.name + ' exceeds 10 MB', 'error'); return; }
    const reader = new FileReader();
    reader.onload = function() {
      documents[type].push({ name: f.name, size: f.size, data: reader.result, mime: f.type });
      renderFileLists();
    };
    reader.readAsDataURL(f);
  });
}

function removeFile(type, idx) {
  documents[type].splice(idx, 1);
  renderFileLists();
}

function renderFileLists() {
  ['identity','medical','insurance'].forEach(function(type) {
    const fl = document.getElementById('fl_' + type);
    const cnt = document.getElementById('cnt_' + type);
    if (cnt) cnt.textContent = documents[type].length;
    if (!fl) return;
    fl.innerHTML = documents[type].map(function(f, i) {
      return '<div class="file-item">' +
        '<span style="font-size:16px">' + (f.mime && f.mime.includes('pdf') ? '&#128196;' : '&#128247;') + '</span>' +
        '<span class="file-name" title="' + escHtml(f.name) + '">' + escHtml(f.name) + '</span>' +
        '<span style="font-size:11px;color:var(--text-light)">' + (f.size/1024).toFixed(0) + ' KB</span>' +
        '<span class="file-remove" onclick="removeFile(\'' + type + '\',' + i + ')">&times;</span>' +
      '</div>';
    }).join('');
  });
}

async function saveDocuments() {
  if (!documents.identity.length) { toast('Please upload at least one identity document', 'error'); return; }
  const btn = document.getElementById('nextBtn');
  btn.disabled = true; btn.textContent = 'Uploading…';
  const allFiles = [
    ...documents.identity.map(function(f) { return Object.assign({}, f, { category: 'identity' }); }),
    ...documents.medical.map(function(f) { return Object.assign({}, f, { category: 'medical' }); }),
    ...documents.insurance.map(function(f) { return Object.assign({}, f, { category: 'insurance' }); }),
  ];
  const ok = await saveSection('documents', { documents: allFiles.map(function(f) { return { name: f.name, category: f.category, data: f.data, mimeType: f.mime }; }) });
  if (ok) { markDone('documents'); nextSection(); }
  else resetNextBtn();
}

// ─────────────────────────────────────────────────
// SECTION 8 — REVIEW & SUBMIT
// ─────────────────────────────────────────────────
function renderReview() {
  const pd = appData.personalDetails || {};
  const lf = appData.lifestyle || {};
  const ch = appData.claimsHistory || {};

  const missingDone = SECTIONS.slice(0, 7).filter(function(s) { return !completed.has(s.id); });
  const missingWarn = missingDone.length ? '<div class="alert alert-warning"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><div><strong>Incomplete sections:</strong> ' + missingDone.map(function(s) { return s.label; }).join(', ') + '. Please complete them before submitting.</div></div>' : '';

  const selectedDiseaseNames = Array.from(selectedDiseases).map(function(id) {
    const d = diseasesList.find(function(x) { return x.id === id; });
    return d ? (DISEASE_EMOJIS[id]||'💊') + ' ' + d.name : id;
  }).join(' &middot; ') || '&#8212;';

  const docSummary = Object.entries(documents).map(function(entry) {
    return entry[1].length ? '<strong>' + entry[0] + ':</strong> ' + entry[1].length + ' file(s)' : '';
  }).filter(Boolean).join(' &middot; ') || 'No documents uploaded';

  document.getElementById('mainContent').innerHTML =
  '<div class="section-header">' +
    '<div class="section-eyebrow">&#9989; Step 8 of 8</div>' +
    '<div class="section-title">Review &amp; Submit</div>' +
    '<div class="section-desc">Review your application below. Click Edit to make changes, then submit when ready.</div>' +
  '</div>' +
  missingWarn +
  '<div class="review-card">' +
    '<div class="review-card-header"><div class="review-card-title">&#128100; Personal Information</div><button class="review-edit-btn" onclick="navigateTo(\'personal\')">Edit</button></div>' +
    '<div class="review-kv-grid">' +
      kvHtml('Full Name', pd.firstName && pd.lastName ? pd.firstName + ' ' + pd.lastName : '&#8212;') +
      kvHtml('Date of Birth', pd.dob || '&#8212;') +
      kvHtml('Gender', pd.gender || '&#8212;') +
      kvHtml('Nationality', pd.nationality || '&#8212;') +
      kvHtml('Email', pd.email || '&#8212;') +
      kvHtml('Mobile', pd.phone || '&#8212;') +
    '</div>' +
  '</div>' +
  '<div class="review-card">' +
    '<div class="review-card-header"><div class="review-card-title">&#127939; Lifestyle Factors</div><button class="review-edit-btn" onclick="navigateTo(\'lifestyle\')">Edit</button></div>' +
    '<div class="review-kv-grid">' +
      kvHtml('Smoking', lf.smokingStatus || '&#8212;') +
      kvHtml('Alcohol', lf.alcoholConsumption || '&#8212;') +
      kvHtml('BMI', lf.bmi ? lf.bmi + ' (' + lf.height + 'cm / ' + lf.weight + 'kg)' : '&#8212;') +
      kvHtml('Exercise', lf.exerciseFrequency || '&#8212;') +
    '</div>' +
  '</div>' +
  '<div class="review-card">' +
    '<div class="review-card-header"><div class="review-card-title">&#128138; Medical Conditions</div><button class="review-edit-btn" onclick="navigateTo(\'conditions\')">Edit</button></div>' +
    '<div style="padding:14px 20px;font-size:13px;color:' + (selectedDiseases.size ? 'var(--text)' : 'var(--text-muted)') + '">' + selectedDiseaseNames + '</div>' +
  '</div>' +
  '<div class="review-card">' +
    '<div class="review-card-header"><div class="review-card-title">&#128206; Documents</div><button class="review-edit-btn" onclick="navigateTo(\'documents\')">Edit</button></div>' +
    '<div style="padding:14px 20px;font-size:13px;color:var(--text-muted)">' + docSummary + '</div>' +
  '</div>' +
  '<div class="consent-block">' +
    '<div class="consent-item"><input type="checkbox" id="consentTruth"><div class="consent-text">I confirm that all information provided in this application is true, accurate and complete to the best of my knowledge. I understand that providing false or misleading information may result in my policy being voided.</div></div>' +
    '<div class="consent-item"><input type="checkbox" id="consentPrivacy"><div class="consent-text">I consent to Daman Health processing my personal and medical data for the purpose of underwriting assessment, in accordance with the UAE Federal Data Protection Law.</div></div>' +
    '<div class="consent-item"><input type="checkbox" id="consentContact"><div class="consent-text">I agree to be contacted by Daman\'s underwriting team regarding my application, by phone or email, as necessary.</div></div>' +
  '</div>' +
  actionBar('submitApplication()', '&#128640; Submit Application');
}

function kvHtml(label, value) {
  return '<div class="review-kv"><div class="review-kv-label">' + label + '</div><div class="review-kv-val">' + value + '</div></div>';
}

async function submitApplication() {
  const missingDone = SECTIONS.slice(0, 7).filter(function(s) { return !completed.has(s.id); });
  if (missingDone.length) {
    toast('Please save these sections first: ' + missingDone.map(function(s) { return s.label; }).join(', '), 'error');
    return;
  }
  const c1 = document.getElementById('consentTruth'), c2 = document.getElementById('consentPrivacy'), c3 = document.getElementById('consentContact');
  if (!c1 || !c1.checked) { toast('Please tick: Declaration of truth (checkbox 1)', 'error'); return; }
  if (!c2 || !c2.checked) { toast('Please tick: Privacy data consent (checkbox 2)', 'error'); return; }
  if (!c3 || !c3.checked) { toast('Please tick: Contact consent (checkbox 3)', 'error'); return; }

  const btn = document.getElementById('nextBtn');
  btn.disabled = true; btn.textContent = '⏳ Submitting…';
  try {
    const res = await fetch('/api/applications/' + appId + '/submit', { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      sessionStorage.setItem('appResult', JSON.stringify(data.data));
      window.location.href = '/customer/confirmation.html';
    } else {
      toast(data.error || 'Submission failed. Please try again.', 'error');
      btn.disabled = false; btn.textContent = '\uD83D\DE80 Submit Application';
    }
  } catch (e) {
    toast('Network error. Please check your connection and try again.', 'error');
    btn.disabled = false; btn.textContent = '\uD83D\DE80 Submit Application';
  }
}

// ─────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────
async function init() {
  // If no appId at all, auto-create one so user can start immediately
  if (!appId) {
    try {
      const create = await fetch('/api/applications', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      const created = await create.json();
      if (created.success) {
        appId = created.data.id;
        sessionStorage.setItem('appId', appId);
      }
    } catch (e) {
      document.getElementById('mainContent').innerHTML =
        '<div class="empty-state" style="margin-top:80px">' +
        '<div class="empty-icon">&#9888;&#65039;</div>' +
        '<div class="empty-title">Cannot reach the server</div>' +
        '<div class="empty-desc">Make sure the server is running on port 3000, then <a href="" onclick="location.reload()" style="color:var(--primary);font-weight:600">reload this page</a>.</div>' +
        '</div>';
      renderNav();
      return;
    }
  }

  document.getElementById('topbarAppId').textContent = 'App ID: ' + appId.slice(0, 8) + '…';

  try {
    const res = await fetch('/api/applications/' + appId);
    if (res.status === 404) {
      // Server was restarted — old appId is gone. Create a fresh application silently.
      const create = await fetch('/api/applications', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      const created = await create.json();
      if (created.success) {
        appId = created.data.id;
        sessionStorage.setItem('appId', appId);
        document.getElementById('topbarAppId').textContent = 'App ID: ' + appId.slice(0, 8) + '…';
      }
      renderNav();
      renderSection();
      return;
    }
    const data = await res.json();
    if (data.success && data.data) {
      const app = data.data;
      if (app.personalDetails && app.personalDetails.firstName) { appData.personalDetails = app.personalDetails; completed.add('personal'); }
      if (app.lifestyle && app.lifestyle.smokingStatus) { appData.lifestyle = app.lifestyle; completed.add('lifestyle'); }
      if (app.familyHistory) { appData.familyHistory = app.familyHistory; Object.assign(appData, app.familyHistory); completed.add('family'); }
      if (app.claimsHistory) { appData.claimsHistory = app.claimsHistory; completed.add('claims'); }
      if (app.disclosures) { appData.disclosures = app.disclosures; Object.assign(appData, app.disclosures); completed.add('disclosure'); }
      if (app.answers && app.answers.length) {
        const dIds = Array.from(new Set(app.answers.map(function(a) { return a.diseaseId; })));
        dIds.forEach(function(id) { selectedDiseases.add(id); });
        app.answers.forEach(function(a) { questionAnswers[a.diseaseId + '_' + a.questionId] = a.answer; });
        completed.add('conditions');
      } else if (app.diseases && app.diseases.length) {
        app.diseases.forEach(function(d) { selectedDiseases.add(d.id); });
        completed.add('conditions');
      }
      if (app.documents && app.documents.length) {
        app.documents.forEach(function(d) { if (documents[d.category]) documents[d.category].push(d); });
        completed.add('documents');
      }
      const firstIncomplete = SECTIONS.find(function(s) { return !completed.has(s.id); });
      if (firstIncomplete) currentSection = firstIncomplete.id;
    }
  } catch (e) { /* network issue — start fresh UI anyway */ }

  renderNav();
  renderSection();
}

init();
</script>
