<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Disease Master — Daman UW</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Disease Master</div>
          <div class="page-subtitle">Manage disease categories, cohorts, and risk weights</div>
        </div>
        <button class="btn btn-primary" onclick="openModal('diseaseModal'); resetForm()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Disease
        </button>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">All Diseases</span>
          <div class="toolbar-search">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="input" type="text" id="searchInput" placeholder="Search diseases…" oninput="filterTable(this.value)">
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Disease Name</th><th>Cohort</th><th>Risk Weight</th><th>Status</th><th style="width:120px">Actions</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="5" class="text-muted" style="padding:24px;text-align:center">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="diseaseModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Add Disease</span>
      <button class="btn-ghost" onclick="closeModal('diseaseModal')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>Disease Name <span class="required">*</span></label>
        <input class="input" type="text" id="fieldName" placeholder="e.g. Diabetes & Metabolic">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Cohort / Category <span class="required">*</span></label>
          <input class="input" type="text" id="fieldCohort" placeholder="e.g. Metabolic">
        </div>
        <div class="form-group">
          <label>Risk Weight (%) <span class="required">*</span></label>
          <input class="input" type="number" id="fieldWeight" min="0" max="100" placeholder="e.g. 20">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('diseaseModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveDisease()">Save Disease</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="/admin/js/api.js"></script>
<script src="/admin/js/layout.js"></script>
<script>
if (!requireAuth()) throw '';
renderLayout('Disease Master');

let diseases = [];

async function load() {
  const r = await apiFetch('/admin/diseases');
  diseases = r.data || [];
  render(diseases);
}

function render(list) {
  const tbody = document.getElementById('tableBody');
  if (!list.length) { tbody.innerHTML = `<tr><td colspan="5"><div class="empty"><p>No diseases configured</p><small>Add your first disease to get started.</small></div></td></tr>`; return; }
  tbody.innerHTML = list.map(d => `
    <tr>
      <td><strong>${d.name}</strong></td>
      <td><span class="tag">${d.cohort}</span></td>
      <td><span style="font-weight:600;color:var(--primary)">${d.riskWeight}%</span></td>
      <td>${badge(d.isActive ? 'ACTIVE' : 'INACTIVE')}</td>
      <td>
        <div class="flex gap-8">
          <button class="btn btn-sm btn-secondary" onclick="editDisease('${d.id}')">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit
          </button>
          <button class="btn btn-sm btn-danger" onclick="deleteDisease('${d.id}','${d.name}')">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
        </div>
      </td>
    </tr>`).join('');
}

function filterTable(q) {
  render(diseases.filter(d => d.name.toLowerCase().includes(q.toLowerCase()) || d.cohort.toLowerCase().includes(q.toLowerCase())));
}

function resetForm() {
  document.getElementById('editId').value = '';
  document.getElementById('fieldName').value = '';
  document.getElementById('fieldCohort').value = '';
  document.getElementById('fieldWeight').value = '';
  document.getElementById('modalTitle').textContent = 'Add Disease';
}

function editDisease(id) {
  const d = diseases.find(x => x.id === id);
  if (!d) return;
  document.getElementById('editId').value = d.id;
  document.getElementById('fieldName').value = d.name;
  document.getElementById('fieldCohort').value = d.cohort;
  document.getElementById('fieldWeight').value = d.riskWeight;
  document.getElementById('modalTitle').textContent = 'Edit Disease';
  openModal('diseaseModal');
}

async function saveDisease() {
  const id = document.getElementById('editId').value;
  const body = {
    name: document.getElementById('fieldName').value.trim(),
    cohort: document.getElementById('fieldCohort').value.trim(),
    riskWeight: Number(document.getElementById('fieldWeight').value),
  };
  if (!body.name || !body.cohort || !body.riskWeight) { toast('All fields are required', 'error'); return; }
  const method = id ? 'PUT' : 'POST';
  const path = id ? `/admin/diseases/${id}` : '/admin/diseases';
  const r = await apiFetch(path, { method, body });
  if (r.success) { toast(id ? 'Disease updated' : 'Disease added', 'success'); closeModal('diseaseModal'); load(); }
  else toast(r.error || 'Error', 'error');
}

async function deleteDisease(id, name) {
  if (!confirm(`Deactivate "${name}"?`)) return;
  const r = await apiFetch(`/admin/diseases/${id}`, { method: 'DELETE' });
  if (r.success) { toast('Disease deactivated', 'success'); load(); }
  else toast(r.error || 'Error', 'error');
}

load();
</script>
</body>
</html>
