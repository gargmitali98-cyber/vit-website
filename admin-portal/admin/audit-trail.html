<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audit Trail — Daman UW</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/css/style.css">
<style>
.action-chip{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
.chip-rule{background:#eff6ff;color:#1d4ed8}
.chip-disease{background:#fdf4ff;color:#7e22ce}
.chip-app{background:#f0fdf4;color:#15803d}
.chip-user{background:#fff7ed;color:#c2410c}
.chip-matrix{background:#fef9c3;color:#854d0e}
.chip-question{background:#f0f9ff;color:#0369a1}
.chip-default{background:var(--bg);color:var(--text-muted)}
.diff-block{font-family:'SF Mono','Fira Code',monospace;font-size:11px;background:var(--bg);border-radius:var(--radius);padding:8px;max-height:80px;overflow:auto;margin-top:4px;color:var(--text-muted)}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Audit Trail</div>
          <div class="page-subtitle">Immutable log of all system actions and decisions</div>
        </div>
        <button class="btn btn-secondary" onclick="exportCSV()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </div>

      <div class="toolbar">
        <div class="toolbar-search">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="input" type="text" id="searchInput" placeholder="Search action or resource…" oninput="applyFilters()">
        </div>
        <select class="select" id="typeFilter" style="width:200px" onchange="applyFilters()">
          <option value="">All action types</option>
          <option value="RULE">Rule changes</option>
          <option value="DISEASE">Disease changes</option>
          <option value="APPLICATION">Application events</option>
          <option value="DECISION">Decisions</option>
          <option value="LOGIN">Login</option>
        </select>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Timestamp</th><th>User</th><th>Action</th><th>Resource</th><th>Resource ID</th><th>Changes</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="6" style="padding:24px;text-align:center;color:var(--text-muted)">Loading…</td></tr></tbody>
          </table>
        </div>
        <div style="padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted)" id="totalCount"></div>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="/admin/js/api.js"></script>
<script src="/admin/js/layout.js"></script>
<script>
if (!requireAuth()) throw '';
renderLayout('Audit Trail');

let logs = [];

const chipClass = action => {
  if (action.includes('RULE')) return 'chip-rule';
  if (action.includes('DISEASE')) return 'chip-disease';
  if (action.includes('APPLICATION') || action.includes('SUBMIT')) return 'chip-app';
  if (action.includes('LOGIN')) return 'chip-user';
  if (action.includes('MATRIX')) return 'chip-matrix';
  if (action.includes('QUESTION')) return 'chip-question';
  return 'chip-default';
};

async function load() {
  const r = await apiFetch('/admin/audit');
  logs = r.data || [];
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const type = document.getElementById('typeFilter').value;
  let list = logs;
  if (type) list = list.filter(l => l.action.includes(type));
  if (q) list = list.filter(l => l.action.toLowerCase().includes(q) || l.resourceType?.toLowerCase().includes(q) || l.resourceId?.toLowerCase().includes(q));
  render(list);
}

function render(list) {
  document.getElementById('totalCount').textContent = `${list.length} entries`;
  const tbody = document.getElementById('tableBody');
  if (!list.length) { tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><p>No audit entries</p><small>Audit logs appear here as actions are taken in the system.</small></div></td></tr>`; return; }
  tbody.innerHTML = list.map(l => {
    const hasDiff = l.before || l.after;
    return `<tr>
      <td class="font-mono" style="white-space:nowrap;font-size:11px">${formatDateTime(l.timestamp)}</td>
      <td style="font-size:12px;font-weight:500">${l.userId === 'system' ? '<span class="text-muted">System</span>' : l.userId}</td>
      <td><span class="action-chip ${chipClass(l.action)}">${l.action.replace(/_/g,' ')}</span></td>
      <td style="font-size:12px">${l.resourceType || '—'}</td>
      <td class="font-mono" style="font-size:11px;color:var(--text-muted)">${l.resourceId?.slice(0,8) || '—'}…</td>
      <td>${hasDiff ? `<span style="font-size:11px;color:var(--primary);cursor:pointer" onclick="toggleDiff(this, \`${encodeURIComponent(JSON.stringify({before:l.before,after:l.after}))}\`)">Show diff</span>` : '<span class="text-muted text-sm">—</span>'}</td>
    </tr>`;
  }).join('');
}

function toggleDiff(el, encoded) {
  const next = el.closest('td');
  const existing = next.querySelector('.diff-block');
  if (existing) { existing.remove(); el.textContent = 'Show diff'; return; }
  const data = JSON.parse(decodeURIComponent(encoded));
  const div = document.createElement('div');
  div.className = 'diff-block';
  div.textContent = JSON.stringify(data, null, 2);
  next.appendChild(div);
  el.textContent = 'Hide diff';
}

function exportCSV() {
  const cols = ['timestamp','userId','action','resourceType','resourceId'];
  const rows = [cols.join(','), ...logs.map(l => cols.map(c => `"${(l[c]||'').toString().replace(/"/g,'""')}"`).join(','))];
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(rows.join('\n'));
  a.download = `audit-trail-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('CSV exported', 'success');
}

load();
</script>
</body>
</html>
